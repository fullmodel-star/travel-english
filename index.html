Do you have this in a bigger size?", "zh": "這個有大一號的嗎？", "tip": "小一號用 smaller size", "tag": "尺寸", "level": 2}, {"en": "Do you have this in another color?", "zh": "這個有其他顏色嗎？", "tip": "指定顏色可說 Do you have it in black?（美式拼 color）", "tag": "尺寸", "level": 2}, {"en": "Where is the fitting room?", "zh": "試衣間在哪裡？", "tip": "fitting room = 試衣間，英式常說 changing room", "tag": "試穿", "level": 2}, {"en": "Is this on sale?", "zh": "這個有打折嗎？", "tip": "詢問折扣 Is there any discount?", "tag": "結帳", "level": 2}, {"en": "Can I get a refund?", "zh": "我可以退款嗎？", "tip": "refund = 退款/退稅通用", "tag": "退貨", "level": 2}, {"en": "I'd like to return this.", "zh": "我想退這個。", "tip": "return = 退貨，記得帶收據與吊牌", "tag": "退貨", "level": 2}, {"en": "It doesn't fit.", "zh": "這件不合身。", "tip": "太緊 too tight／太鬆 too loose", "tag": "退貨", "level": 2}, {"en": "It's faulty.", "zh": "這件有瑕疵。", "tip": "faulty = 瑕疵/故障，退貨最有力的理由", "tag": "退貨", "level": 2}, {"en": "Can I get a tax refund?", "zh": "我可以退稅嗎？", "tip": "tax refund = 退稅，需帶護照", "tag": "退稅", "level": 2}, {"en": "Could I get a receipt?", "zh": "可以給我收據嗎？", "tip": "退稅與退貨都需要收據，記得留好", "tag": "退稅", "level": 2}, {"en": "Could you fill out the tax refund form for me?", "zh": "可以幫我辦退稅表嗎？", "tip": "tax refund form = 退稅表", "tag": "退稅", "level": 3}, {"en": "How much do I need to spend to qualify for the refund?", "zh": "要消費多少才能退稅？", "tip": "詢問退稅門檻", "tag": "退稅", "level": 3}], "dialogue": {"title": "購物退稅 情境對話", "youRole": "旅客", "npcRole": "店員", "lines": [{"who": "you", "en": "Hi, excuse me. How much is this blue jacket? I don't see a price tag on it.", "zh": "嗨，不好意思。這件藍色外套多少錢？我沒看到價錢標籤。"}, {"who": "npc", "en": "Let me check for you. It's 89 euros. It's actually on sale this week, so it's a bit cheaper than usual.", "zh": "我幫您查一下，這件是89歐元。這週剛好特價，所以比平常便宜一點。"}, {"who": "you", "en": "Oh, nice. Can my daughter try it on? Where's the fitting room?", "zh": "喔，太好了。可以讓我女兒試穿嗎？試衣間在哪裡？"}, {"who": "npc", "en": "Of course. The fitting rooms are right behind you, on the right. What size does she need?", "zh": "當然可以。試衣間就在您後面，右手邊。她需要什麼尺寸？"}, {"who": "you", "en": "She usually wears a small, but this one feels a little tight on the shoulders. Do you have a medium?", "zh": "她平常穿S號，但這件肩膀有點緊。你們有M號嗎？"}, {"who": "npc", "en": "Let me have a look... Yes, here's a medium. If it still doesn't fit, we can order it in a different color online for you.", "zh": "我找找看…有的，這是M號。如果還是不合身，我們可以幫您在網路上訂別的顏色。"}, {"who": "you", "en": "This one fits great. We'll take it. By the way, we're tourists—can we get a tax refund?", "zh": "這件很合身，我們要了。對了，我們是遊客，可以退稅嗎？"}, {"who": "npc", "en": "Sure. As long as you spend over 50 euros on a single receipt, you qualify. I'll just need your passport to fill out the form.", "zh": "可以。只要同一張收據消費超過50歐元就符合資格。我需要您的護照來填退稅單。"}, {"who": "you", "en": "Here you go. So do I get the money back here, or at the airport?", "zh": "護照給您。那我是在這裡拿到退款，還是在機場拿？"}, {"who": "npc", "en": "At the airport. Get this form stamped at customs, then take it to the refund counter. Keep the tag on until then.", "zh": "在機場。把這張單子拿去海關蓋章，再拿到退稅櫃檯。在那之前先別把吊牌剪掉。"}, {"who": "you", "en": "Got it. One more thing—if it doesn't work out, can we return it for a refund?", "zh": "了解。還有一件事，如果不適合，我們可以退貨退款嗎？"}, {"who": "npc", "en": "Yes, within 30 days with the receipt. But once the tax form is stamped, we can only exchange it, not give you a cash refund.", "zh": "可以，30天內憑收據都行。不過退稅單一旦蓋了章，我們就只能換貨，不能退現金了。"}]}}, {"id": "money", "icon": "💱", "title": "換匯銀行", "titleEn": "Money & Bank", "desc": "換匯、提款機、匯率、刷卡糾紛", "country": "US", "words": [{"en": "exchange", "zh": "換匯", "ico": "💱"}, {"en": "exchange rate", "zh": "匯率", "ico": "📈"}, {"en": "service fee", "zh": "手續費", "ico": "💸"}, {"en": "bills", "zh": "鈔票", "ico": "💵"}, {"en": "ATM", "zh": "提款機", "ico": "🏧"}, {"en": "withdraw", "zh": "提款", "ico": "💰"}, {"en": "currency", "zh": "貨幣", "ico": "💴"}, {"en": "receipt", "zh": "收據", "ico": "🧾"}], "patterns": [{"en": "I'd like to ___.", "zh": "我想要…。", "slots": ["exchange some money", "change ten thousand Taiwan dollars", "withdraw some cash"]}, {"en": "Where is the nearest ___?", "zh": "最近的…在哪裡？", "slots": ["ATM", "bank", "exchange counter"]}], "phrases": [{"en": "I'd like to exchange some money.", "zh": "我想換一些錢。", "tip": "換匯開場白", "tag": "換匯", "level": 1, "survival": true, "homophone": "愛・賴克・兔・伊克斯淺吉・桑・媽尼"}, {"en": "Where is the nearest ATM?", "zh": "最近的提款機在哪裡？", "tip": "ATM = 提款機", "tag": "提款機", "level": 1, "survival": true, "homophone": "威爾・易斯・惹・尼爾瑞斯特・A-T-M"}, {"en": "Can I pay in cash?", "zh": "我可以付現金嗎？", "tip": "cash = 現金，card = 信用卡", "tag": "刷卡問題", "level": 1, "survival": true, "homophone": "肯・愛・配・引・卡許"}, {"en": "What's the exchange rate today?", "zh": "今天的匯率是多少？", "tip": "exchange rate = 匯率", "tag": "匯率", "level": 2, "survival": true, "homophone": "哇茨・惹・伊克斯淺吉・瑞特・特day"}, {"en": "I'd like to change these Taiwan dollars into US dollars.", "zh": "我想把台幣換成美金。", "tip": "換成日圓 into Japanese yen", "tag": "換匯", "level": 2}, {"en": "Is there a commission or service fee?", "zh": "有手續費嗎？", "tip": "commission / service fee = 手續費", "tag": "匯率", "level": 2}, {"en": "Could I have some smaller bills?", "zh": "可以換一些小鈔嗎？", "tip": "美式 bills = 鈔票（英式說 notes）；coins = 硬幣", "tag": "換匯", "level": 2}, {"en": "Can I withdraw cash with this card here?", "zh": "我可以用這張卡在這裡提款嗎？", "tip": "withdraw = 提款", "tag": "提款機", "level": 2}, {"en": "My card was declined. Can you check why?", "zh": "我的卡刷不過，可以幫我查一下嗎？", "tip": "declined = 交易被拒", "tag": "刷卡問題", "level": 2}, {"en": "Do you accept foreign cards?", "zh": "你們收外國的卡嗎？", "tip": "確認是否能用海外卡", "tag": "刷卡問題", "level": 2}, {"en": "Please charge it in the local currency, not Taiwan dollars.", "zh": "請用當地貨幣結帳，不要用台幣。", "tip": "DCC（外幣直接換台幣）最坑，選當地貨幣結帳最省錢", "tag": "刷卡問題", "level": 3}, {"en": "I was charged twice.", "zh": "我被扣了兩次款。", "tip": "twice = 兩次", "tag": "刷卡問題", "level": 2}, {"en": "There's a double charge.", "zh": "有一筆重複扣款。", "tip": "double charge = 重複扣款", "tag": "刷卡問題", "level": 2}, {"en": "This amount is wrong.", "zh": "這個金額不對。", "tip": "amount = 金額", "tag": "刷卡問題", "level": 2}, {"en": "I was overcharged.", "zh": "我被多收錢了。", "tip": "overcharged = 被多收費", "tag": "刷卡問題", "level": 3}, {"en": "Could I get a receipt for the exchange?", "zh": "換匯可以給我收據嗎？", "tip": "留收據方便核對", "tag": "換匯", "level": 2}], "dialogue": {"title": "換匯銀行 情境對話", "youRole": "旅客", "npcRole": "銀行櫃檯", "lines": [{"who": "you", "en": "Hi, we'd like to exchange some money. Do you take Taiwan dollars here?", "zh": "你好，我們想換一點錢。你們這裡收台幣嗎？"}, {"who": "npc", "en": "Yes, we do. How much would you like to exchange today?", "zh": "收的。您今天想換多少？"}, {"who": "you", "en": "About three hundred US dollars' worth. What's your exchange rate right now?", "zh": "大概三百美元左右。你們現在的匯率是多少？"}, {"who": "npc", "en": "It's 32.1 today. There's also a small handling fee of NT$100 per transaction.", "zh": "今天是32.1。另外每筆會收台幣一百元的手續費。"}, {"who": "you", "en": "Okay. Actually, would it be cheaper to just withdraw cash from an ATM instead?", "zh": "好。其實，如果我直接用提款機領現金，會不會比較划算？"}, {"who": "npc", "en": "Sometimes, but your own bank may charge you an overseas withdrawal fee. Our rate here is fixed, so you'll know exactly how much you're getting.", "zh": "有時候會，但您自己的銀行可能也會收海外提款費。我們這邊的匯率是固定的，您能清楚知道換到多少。"}, {"who": "you", "en": "Got it. By the way, I'm having a problem with my credit card. I got charged twice for the same hotel booking.", "zh": "了解。對了，我的信用卡有點問題。同一筆飯店訂房被扣了兩次款。"}, {"who": "npc", "en": "I'm sorry to hear that. We can't handle card disputes at this counter, but you should call the number on the back of your card.", "zh": "很抱歉聽到這件事。刷卡爭議沒辦法在這個櫃檯處理，但您可以打卡片背面的電話。"}, {"who": "you", "en": "Alright, I'll call them later. So let's go ahead with three hundred US dollars in cash, please.", "zh": "好，我等一下打給他們。那就先麻煩換三百美元現金，謝謝。"}, {"who": "npc", "en": "Sure. Here's your cash and your receipt. Please count it before you leave the counter.", "zh": "好的。這是您的現金和收據，請在離開櫃檯前先當場點清楚。"}]}}, {"id": "attractions", "icon": "🎡", "title": "景點售票", "titleEn": "Attractions & Tickets", "desc": "買門票、開放時間、導覽、拍照", "country": "US", "words": [{"en": "ticket", "zh": "門票", "ico": "🎟️"}, {"en": "admission", "zh": "入場費", "ico": "🎫"}, {"en": "adult", "zh": "成人", "ico": "🧑"}, {"en": "child", "zh": "兒童", "ico": "🧒"}, {"en": "guided tour", "zh": "導覽", "ico": "🧭"}, {"en": "audio guide", "zh": "語音導覽", "ico": "🎧"}, {"en": "map", "zh": "地圖", "ico": "🗺️"}, {"en": "restroom", "zh": "廁所", "ico": "🚻"}], "patterns": [{"en": "___, please.", "zh": "請給我…。", "slots": ["Two adult tickets", "One student ticket", "Two adults and one child"]}, {"en": "What time do you ___?", "zh": "你們幾點…？", "slots": ["open", "close", "start the last tour"]}, {"en": "Is there a ___?", "zh": "有…嗎？", "slots": ["guided tour", "family ticket", "discount"]}], "phrases": [{"en": "Two adult tickets, please.", "zh": "兩張成人票，謝謝。", "tip": "一大兩小 = one adult and two children", "tag": "買門票", "level": 1, "survival": true, "homophone": "凸・額斗特・踢kits・普利斯"}, {"en": "How much is admission?", "zh": "門票多少錢？", "tip": "admission = 入場費", "tag": "買門票", "level": 1, "survival": true, "homophone": "好・馬取・易斯・額d密遜"}, {"en": "What time do you open and close?", "zh": "你們幾點開門、幾點關門？", "tip": "closing time = 關門時間", "tag": "開放時間", "level": 1, "survival": true, "homophone": "哇特・太m・讀・you・歐盆・an・克落斯"}, {"en": "Can I take photos here?", "zh": "這裡可以拍照嗎？", "tip": "No flash, please = 請勿使用閃光燈", "tag": "拍照", "level": 1, "survival": true, "homophone": "肯・愛・têk・佛頭斯・here"}, {"en": "Where are the restrooms?", "zh": "廁所在哪裡？", "tip": "restroom / toilet = 廁所", "tag": "設施", "level": 1, "survival": true, "homophone": "威爾・阿・惹・瑞斯特潤斯"}, {"en": "Do you have student tickets?", "zh": "有學生票嗎？", "tip": "student ticket = 學生票，記得帶學生證", "tag": "買門票", "level": 2}, {"en": "Is there a family ticket?", "zh": "有家庭票嗎？", "tip": "family ticket 通常更划算", "tag": "買門票", "level": 2}, {"en": "Are children under six free?", "zh": "六歲以下小孩免費嗎？", "tip": "確認兒童優惠", "tag": "買門票", "level": 2}, {"en": "What time is the last entry?", "zh": "最後入場時間是幾點？", "tip": "也可說 When's last admission?（last entry 是時間點，不用 start）", "tag": "開放時間", "level": 2}, {"en": "Is there a guided tour?", "zh": "有導覽嗎？", "tip": "guided tour = 導覽", "tag": "導覽", "level": 2}, {"en": "Do you have an audio guide in Chinese?", "zh": "有中文的語音導覽嗎？", "tip": "audio guide = 語音導覽", "tag": "導覽", "level": 2}, {"en": "Could you take a photo of us, please?", "zh": "可以幫我們拍張照嗎？", "tip": "請人幫拍照的禮貌說法", "tag": "拍照", "level": 2}, {"en": "Is there a map or a brochure?", "zh": "有地圖或簡介嗎？", "tip": "brochure = 簡介手冊", "tag": "設施", "level": 2}, {"en": "Do we need to book in advance?", "zh": "我們需要事先預約嗎？", "tip": "book in advance = 事先預約", "tag": "買門票", "level": 3}], "dialogue": {"title": "景點售票 情境對話", "youRole": "旅客", "npcRole": "售票員", "lines": [{"who": "you", "en": "Hi, we'd like to buy tickets — two adults and two kids.", "zh": "你好，我們想買門票，兩位大人、兩位小孩。"}, {"who": "npc", "en": "Sure. How old are the kids? Children under six get in free.", "zh": "好的，小朋友幾歲呢？六歲以下免費入場。"}, {"who": "you", "en": "One's five and the other's eight. So that's one free and one child ticket?", "zh": "一個五歲、一個八歲。所以是一張免費、一張兒童票，對嗎？"}, {"who": "npc", "en": "Exactly. So it's two adults and one child — that comes to 45 dollars altogether.", "zh": "沒錯。這樣是兩張全票加一張兒童票，總共45元。"}, {"who": "you", "en": "Sounds good. By the way, what time do you close today?", "zh": "好，沒問題。順便問一下，你們今天幾點關門？"}, {"who": "npc", "en": "We close at six, but last entry is at five thirty.", "zh": "我們六點關門，不過最後入場時間是五點半。"}, {"who": "you", "en": "Good to know, thanks. Do you have a guided tour? My kids would love to learn more.", "zh": "知道了，謝謝。有導覽嗎？我的孩子應該會很想多了解一些。"}, {"who": "npc", "en": "There's an English tour at two. It's free, but you'll need to sign up over at that desk.", "zh": "兩點有一場英文導覽，是免費的，不過要先去那個櫃台報名。"}, {"who": "you", "en": "Perfect timing. Oh, one more thing — can we take photos inside?", "zh": "時間剛剛好。喔對了，還有一件事，裡面可以拍照嗎？"}, {"who": "npc", "en": "Photos are fine, just no flash please. And no tripods in the main hall.", "zh": "拍照沒問題，只是請不要開閃光燈。另外主展廳不能用腳架。"}, {"who": "you", "en": "No problem at all. Thanks so much for your help!", "zh": "完全沒問題。真的很謝謝你的幫忙！"}, {"who": "npc", "en": "You're welcome. Enjoy your visit, and have fun on the tour!", "zh": "不客氣，祝你們玩得愉快，導覽也玩得開心！"}]}}, {"id": "sim-internet", "icon": "📶", "title": "網路SIM卡", "titleEn": "SIM & Internet", "desc": "買SIM卡、eSIM、Wi-Fi、儲值", "country": "US", "words": [{"en": "SIM card", "zh": "SIM卡", "ico": "📇"}, {"en": "eSIM", "zh": "電子SIM", "ico": "📲"}, {"en": "data", "zh": "數據流量", "ico": "📊"}, {"en": "unlimited", "zh": "無限（吃到飽）", "ico": "♾️"}, {"en": "top up", "zh": "儲值", "ico": "💳"}, {"en": "Wi-Fi", "zh": "無線網路", "ico": "📡"}, {"en": "password", "zh": "密碼", "ico": "🔑"}, {"en": "activate", "zh": "開通", "ico": "✅"}, {"en": "coverage", "zh": "收訊範圍", "ico": "🗺️"}], "patterns": [{"en": "Do you have ___?", "zh": "你們有…嗎？", "slots": ["a tourist SIM card", "an eSIM", "free Wi-Fi", "an unlimited plan"]}, {"en": "How do I ___?", "zh": "我要怎麼…？", "slots": ["top up", "activate the eSIM", "set it up", "connect to Wi-Fi"]}], "phrases": [{"en": "Hi, I'd like to buy a SIM card for internet.", "zh": "你好，我想買一張上網用的SIM卡。", "tip": "也可說 a data SIM card", "tag": "買卡", "level": 1}, {"en": "Do you have a SIM card for tourists?", "zh": "你們有給觀光客用的SIM卡嗎？", "tip": "tourist SIM / traveler SIM", "tag": "買卡", "level": 1}, {"en": "How many gigabytes do I get?", "zh": "這張有多少GB？", "tip": "GB 唸 gigabytes", "tag": "方案", "level": 2}, {"en": "How many days is it valid for?", "zh": "可以用幾天？", "tip": "valid = 有效", "tag": "方案", "level": 2}, {"en": "Is the data unlimited?", "zh": "這是吃到飽（無限流量）嗎？", "tip": "unlimited = 無限；避免說 Is it unlimited data?", "tag": "方案", "level": 2}, {"en": "Which plan is best for a family of four?", "zh": "四口之家用哪個方案最好？", "tip": "a family of four = 四口之家", "tag": "方案", "level": 2}, {"en": "Can you help me set it up?", "zh": "可以幫我裝好嗎？", "tip": "set it up = 設定安裝", "tag": "安裝", "level": 1}, {"en": "Can you put the SIM card in for me?", "zh": "可以幫我把SIM卡裝進手機嗎？", "tip": "", "tag": "安裝", "level": 2}, {"en": "I'd like an eSIM instead. Can I scan a QR code?", "zh": "我想要eSIM，可以掃QR碼嗎？", "tip": "eSIM 免實體卡", "tag": "eSIM", "level": 2}, {"en": "Where do I scan the QR code to activate it?", "zh": "要掃哪裡的QR碼來開通？", "tip": "activate = 開通", "tag": "eSIM", "level": 2}, {"en": "My data isn't working. Can you check it?", "zh": "我的網路不通，可以幫我看一下嗎？", "tip": "", "tag": "問題", "level": 2}, {"en": "How do I top up when I run out of data?", "zh": "流量用完了要怎麼儲值？", "tip": "top up / recharge = 儲值", "tag": "儲值", "level": 2}, {"en": "Can I top up online with a credit card?", "zh": "可以用信用卡線上儲值嗎？", "tip": "", "tag": "儲值", "level": 2}, {"en": "Excuse me, what's the Wi-Fi password here?", "zh": "不好意思，這裡的Wi-Fi密碼是什麼？", "tip": "", "tag": "Wi-Fi", "level": 1}, {"en": "Is there free Wi-Fi in this area?", "zh": "這附近有免費Wi-Fi嗎？", "tip": "", "tag": "Wi-Fi", "level": 1}, {"en": "The Wi-Fi keeps disconnecting.", "zh": "Wi-Fi一直斷線。", "tip": "disconnect = 斷線", "tag": "問題", "level": 2}], "dialogue": {"title": "網路SIM卡 情境對話", "youRole": "旅客", "npcRole": "門市店員", "lines": [{"who": "you", "en": "Hi, we just landed and need internet for our phones. Do you sell tourist SIM cards here?", "zh": "嗨，我們剛下飛機，手機需要網路。你們這裡有賣觀光客用的SIM卡嗎？"}, {"who": "npc", "en": "Sure. How many days are you staying, and how many phones need data?", "zh": "當然有。你們要待幾天？有幾支手機要用網路？"}, {"who": "you", "en": "About ten days. We're a family of four, but honestly only two phones really need data.", "zh": "大概十天。我們一家四口，不過老實說只有兩支手機真的需要網路。"}, {"who": "npc", "en": "Got it. For two phones, I'd suggest one unlimited-data SIM. You can share it as a hotspot with the others.", "zh": "了解。兩支手機的話，我建議買一張吃到飽SIM卡，再開熱點分享給其他人就好。"}, {"who": "you", "en": "That sounds good. But my phone is an iPhone 15. Can I use an eSIM instead? I don't want to lose my Taiwan number.", "zh": "聽起來不錯。不過我的手機是iPhone 15，可以改用eSIM嗎？我不想拿掉台灣的號碼。"}, {"who": "npc", "en": "No problem, an eSIM is perfect for that. Your Taiwan SIM stays in, and we just scan a QR code to add ours.", "zh": "沒問題，eSIM正好適合。你的台灣SIM卡留著就好，我們只要掃一個QR code就能加進去。"}, {"who": "you", "en": "Great. And if we run out of data before we head home, can we add more? Like top up?", "zh": "太好了。那如果回國前流量用完，可以加購嗎？像儲值那樣？"}, {"who": "npc", "en": "Yes, you can top up anytime in our app or at any branch. It only takes a minute.", "zh": "可以，隨時能在我們的App或任何門市儲值，一分鐘就搞定。"}, {"who": "you", "en": "One more thing. Our hotel has free Wi-Fi, right? Maybe we won't need that much data.", "zh": "還有一件事。我們的飯店有免費Wi-Fi吧？也許我們不用買那麼多流量。"}, {"who": "npc", "en": "Most do, but it can get slow at night. With unlimited data, you won't have to worry when you're out sightseeing.", "zh": "大部分飯店都有，但晚上可能會變慢。買吃到飽的話，你們出門觀光時就完全不用擔心了。"}, {"who": "you", "en": "Okay, let's go with the eSIM plus one physical SIM for my wife. How much is that all together?", "zh": "好，那我們就選eSIM，再幫我太太買一張實體SIM卡。全部加起來多少錢？"}, {"who": "npc", "en": "That'll be forty dollars total. Let me set them up now, and I'll test both before you leave.", "zh": "總共四十元。我現在幫你們設定，離開前我會先把兩張都測試好。"}]}}, {"id": "pharmacy", "icon": "💊", "title": "藥局", "titleEn": "Pharmacy", "desc": "買成藥、症狀描述、用法用量", "country": "US", "words": [{"en": "painkiller", "zh": "止痛藥", "ico": "💊"}, {"en": "fever", "zh": "發燒", "ico": "🤒"}, {"en": "cold medicine", "zh": "感冒藥", "ico": "🤧"}, {"en": "antihistamine", "zh": "抗過敏藥", "ico": "🌸"}, {"en": "motion sickness pills", "zh": "暈車藥", "ico": "🚗"}, {"en": "insect repellent", "zh": "防蚊蟲液", "ico": "🦟"}, {"en": "sunburn cream", "zh": "曬傷藥膏", "ico": "☀️"}, {"en": "Band-Aids", "zh": "OK繃", "ico": "🩹"}, {"en": "prescription", "zh": "處方箋", "ico": "📋"}, {"en": "side effects", "zh": "副作用", "ico": "⚠️"}], "patterns": [{"en": "I have ___.", "zh": "我有…（症狀）。", "slots": ["a headache", "a fever", "an upset stomach", "a sore throat", "a runny nose"]}, {"en": "Do you have something for ___?", "zh": "有沒有治…的藥？", "slots": ["a cold", "motion sickness", "allergies", "diarrhea", "insect bites"]}], "phrases": [{"en": "Hi, I'm not feeling well. Can you help me?", "zh": "你好，我不太舒服，可以幫我嗎？", "tip": "", "tag": "開場", "level": 1}, {"en": "I have a headache.", "zh": "我頭痛。", "tip": "換症狀：a fever 發燒／a stomachache 肚子痛", "tag": "症狀", "level": 1}, {"en": "I have a fever and a sore throat.", "zh": "我發燒又喉嚨痛。", "tip": "sore throat = 喉嚨痛", "tag": "症狀", "level": 1}, {"en": "I have an upset stomach.", "zh": "我腸胃不舒服。", "tip": "拉肚子的婉轉說法，比 diarrhea 好開口", "tag": "症狀", "level": 1}, {"en": "I have diarrhea.", "zh": "我拉肚子。", "tip": "diarrhea 唸 /ˌdaɪəˈriːə/；婉轉版說 I have an upset stomach.", "tag": "症狀", "level": 2}, {"en": "I think I caught a cold.", "zh": "我好像感冒了。", "tip": "catch a cold = 感冒", "tag": "症狀", "level": 1}, {"en": "Do you have any painkillers?", "zh": "有沒有止痛藥？", "tip": "painkiller / pain reliever", "tag": "找藥", "level": 1}, {"en": "Do you have medicine for an upset stomach?", "zh": "有沒有治肚子不舒服的藥？", "tip": "upset stomach = 腸胃不適", "tag": "找藥", "level": 1}, {"en": "Do you have anything for motion sickness?", "zh": "有沒有暈車藥？", "tip": "motion sickness pills = 暈車藥", "tag": "找藥", "level": 2}, {"en": "Do you have an antihistamine for allergies?", "zh": "有沒有抗過敏藥？", "tip": "antihistamine = 抗組織胺（抗過敏）", "tag": "找藥", "level": 2}, {"en": "Do you sell insect repellent?", "zh": "有賣防蚊蟲液嗎？", "tip": "insect repellent = 防蚊蟲液", "tag": "找藥", "level": 2}, {"en": "Do you have cream for a sunburn?", "zh": "有沒有曬傷藥膏？", "tip": "sunburn cream / aloe gel", "tag": "找藥", "level": 2}, {"en": "Can I get some Band-Aids?", "zh": "可以給我一些OK繃嗎？", "tip": "Band-Aids = OK繃（美式）", "tag": "找藥", "level": 1}, {"en": "Do you have anything for diarrhea?", "zh": "有沒有止瀉藥？", "tip": "anti-diarrheal = 止瀉藥", "tag": "找藥", "level": 2}, {"en": "Do you have a laxative?", "zh": "有沒有便秘藥（軟便劑）？", "tip": "laxative = 通便／軟便劑", "tag": "找藥", "level": 2}, {"en": "Where can I find feminine hygiene products?", "zh": "生理用品在哪裡？", "tip": "feminine hygiene products = 生理用品；pads 衛生棉", "tag": "找藥", "level": 2}, {"en": "Is there something for a runny nose?", "zh": "有沒有治流鼻水的藥？", "tip": "runny nose = 流鼻水", "tag": "找藥", "level": 1}, {"en": "How do I take this?", "zh": "這個怎麼吃？", "tip": "", "tag": "用法", "level": 1}, {"en": "How many times a day should I take it?", "zh": "一天要吃幾次？", "tip": "", "tag": "用法", "level": 2}, {"en": "Should I take it before or after meals?", "zh": "飯前還是飯後吃？", "tip": "before/after meals = 飯前／飯後", "tag": "用法", "level": 2}, {"en": "Are there any side effects?", "zh": "有沒有副作用？", "tip": "side effects = 副作用", "tag": "用法", "level": 2}, {"en": "Will this make me drowsy?", "zh": "吃了會想睡嗎？", "tip": "drowsy = 想睡的", "tag": "用法", "level": 2}, {"en": "Do I need a prescription for this?", "zh": "這個需要處方嗎？", "tip": "prescription = 處方箋", "tag": "處方", "level": 2}, {"en": "Is this safe for children?", "zh": "小孩可以吃嗎？", "tip": "", "tag": "安全", "level": 2}, {"en": "I'm allergic to aspirin. Is this okay?", "zh": "我對阿斯匹靈過敏，這個可以吃嗎？", "tip": "allergic to = 對…過敏", "tag": "安全", "level": 2, "survival": true, "homophone": "愛姆 阿勒吉克 兔 阿斯匹林"}], "dialogue": {"title": "藥局 情境對話", "youRole": "旅客", "npcRole": "藥師", "lines": [{"who": "you", "en": "Hi, could you help us? My daughter's had a runny nose and a cough since last night.", "zh": "你好，可以幫我們一下嗎？我女兒從昨晚開始就一直流鼻水又咳嗽。"}, {"who": "npc", "en": "Of course. Does she have a fever, or is it just the cough and runny nose?", "zh": "當然。她有發燒嗎，還是只有咳嗽跟流鼻水？"}, {"who": "you", "en": "No fever, but her throat's a little sore too. She's nine years old.", "zh": "沒發燒，不過她喉嚨也有點痛。她九歲。"}, {"who": "npc", "en": "Okay. Is she allergic to any medicines that you know of?", "zh": "好的。就你所知，她對任何藥物過敏嗎？"}, {"who": "you", "en": "Not that we know of. Do you have anything non-drowsy? We're travelling and she gets carsick easily.", "zh": "就我們所知沒有。你有不會想睡的藥嗎？我們在旅行，她又很容易暈車。"}, {"who": "npc", "en": "In that case, I'd suggest this non-drowsy kids' syrup. It covers both the cough and the runny nose.", "zh": "這樣的話，我建議這款不嗜睡的兒童糖漿，咳嗽跟流鼻水都能顧到。"}, {"who": "you", "en": "Great. How much should she take, and how often?", "zh": "太好了。她要吃多少，多久一次？"}, {"who": "npc", "en": "One spoonful—that's 5 ml—three times a day, after meals. There's a measuring cup inside.", "zh": "一匙，也就是5毫升，一天三次，飯後吃。裡面附了量杯。"}, {"who": "you", "en": "Can she take it together with her carsick pills, or should we space them out?", "zh": "她可以跟暈車藥一起吃嗎，還是要隔開？"}, {"who": "npc", "en": "Leave about two hours between them, just to be safe. And if the cough hasn't improved in three days, see a doctor.", "zh": "保險起見，兩種藥中間隔大約兩小時。另外，如果咳嗽三天內沒好轉，就去看醫生。"}, {"who": "you", "en": "Got it. We'll take one bottle. Thank you so much for your help!", "zh": "了解。我們買一瓶，非常謝謝你的幫忙！"}]}}, {"id": "doctor", "icon": "🏥", "title": "看病", "titleEn": "Seeing a Doctor", "desc": "掛號、描述病情、拿藥、保險", "country": "US", "words": [{"en": "appointment", "zh": "預約", "ico": "📅"}, {"en": "symptom", "zh": "症狀", "ico": "🤕"}, {"en": "emergency room", "zh": "急診室", "ico": "🚑"}, {"en": "prescription", "zh": "處方箋", "ico": "📋"}, {"en": "allergic", "zh": "過敏", "ico": "⚠️"}, {"en": "insurance", "zh": "保險", "ico": "🛡️"}, {"en": "receipt", "zh": "收據", "ico": "🧾"}, {"en": "medical certificate", "zh": "診斷證明", "ico": "📄"}], "patterns": [{"en": "I've had ___ since ___.", "zh": "我從…就一直…", "slots": ["a fever / yesterday", "a cough / this morning", "a headache / last night"]}, {"en": "It hurts ___.", "zh": "…會痛。", "slots": ["here", "when I breathe", "when I move", "all over"]}], "phrases": [{"en": "I'd like to see a doctor, please.", "zh": "我想看醫生。", "tip": "", "tag": "掛號", "level": 1}, {"en": "Where's the emergency room?", "zh": "急診室在哪裡？", "tip": "美式用 emergency room（ER）；英式用 A&E", "tag": "掛號", "level": 1, "survival": true, "homophone": "威爾斯 勒 伊墨真西 潤"}, {"en": "I don't have an appointment. Is that okay?", "zh": "我沒有預約，可以嗎？", "tip": "appointment = 預約", "tag": "掛號", "level": 2}, {"en": "How long is the wait?", "zh": "要等多久？", "tip": "", "tag": "掛號", "level": 2}, {"en": "I've had a fever since yesterday.", "zh": "我從昨天開始發燒。", "tip": "since = 從…以來", "tag": "病情", "level": 1}, {"en": "It hurts here.", "zh": "這裡會痛。", "tip": "邊指邊說最清楚", "tag": "病情", "level": 1}, {"en": "I have a bad cough and a sore throat.", "zh": "我咳得很厲害，還喉嚨痛。", "tip": "cough = 咳嗽", "tag": "病情", "level": 1}, {"en": "I've been throwing up since this morning.", "zh": "我從早上就一直吐。", "tip": "throw up = 嘔吐", "tag": "病情", "level": 2}, {"en": "The pain is getting worse.", "zh": "越來越痛。", "tip": "getting worse = 惡化", "tag": "病情", "level": 2}, {"en": "I'm allergic to penicillin.", "zh": "我對盤尼西林過敏。", "tip": "換藥名：aspirin 阿斯匹靈", "tag": "過敏", "level": 2, "survival": true, "homophone": "愛姆 阿勒吉克 兔 盤尼西林"}, {"en": "Do I need any medicine?", "zh": "我需要吃藥嗎？", "tip": "", "tag": "拿藥", "level": 1}, {"en": "Where can I pick up the medicine?", "zh": "藥要去哪裡拿？", "tip": "pick up = 領取", "tag": "拿藥", "level": 2}, {"en": "I have travel insurance. Can I get a receipt?", "zh": "我有旅遊保險，可以給我收據嗎？", "tip": "receipt = 收據", "tag": "保險", "level": 2}, {"en": "Can you give me an itemized bill for insurance?", "zh": "可以給我明細收據報保險嗎？", "tip": "itemized bill = 明細帳單", "tag": "保險", "level": 3}, {"en": "Could you write me a medical certificate?", "zh": "可以幫我開診斷證明嗎？", "tip": "medical certificate = 診斷證明", "tag": "證明", "level": 3}, {"en": "How much will this cost?", "zh": "這樣要多少錢？", "tip": "", "tag": "費用", "level": 1}, {"en": "Do you accept credit cards?", "zh": "可以刷卡嗎？", "tip": "", "tag": "費用", "level": 1}], "dialogue": {"title": "看病 情境對話", "youRole": "旅客", "npcRole": "醫生", "lines": [{"who": "you", "en": "Hi, my daughter isn't feeling well. Can she see a doctor here? We don't have an appointment.", "zh": "你好，我女兒不太舒服，她可以在這裡看醫生嗎？我們沒有預約。"}, {"who": "npc", "en": "Of course. We can fit her in. Could you fill out this form and show me her passport?", "zh": "當然可以，我們幫她安排。可以請你填這張表，並讓我看一下她的護照嗎？"}, {"who": "you", "en": "Here you go. She's had a fever since last night and keeps saying her throat hurts.", "zh": "給你。她從昨晚開始發燒，一直說喉嚨痛。"}, {"who": "npc", "en": "Okay. Has she thrown up or had any trouble breathing?", "zh": "好的。她有嘔吐或呼吸困難的情況嗎？"}, {"who": "you", "en": "No, she hasn't, but she barely ate today and feels really tired.", "zh": "沒有，不過她今天幾乎沒吃東西，覺得很累。"}, {"who": "npc", "en": "The doctor will call her in in a few minutes. Please have a seat in the waiting area.", "zh": "醫生幾分鐘後就會叫她進去。請先到候診區坐一下。"}, {"who": "you", "en": "Thank you. After she sees the doctor, where do we pick up the medicine?", "zh": "謝謝。她看完醫生後，我們要去哪裡領藥？"}, {"who": "npc", "en": "The doctor says it's just a throat infection. Here's a prescription and something to bring the fever down.", "zh": "醫生說只是喉嚨發炎。這是處方箋，還有幫她退燒的藥。"}, {"who": "you", "en": "Great. How often should she take it, and should she take it with food?", "zh": "太好了。這個藥要多久吃一次？需要配著食物吃嗎？"}, {"who": "npc", "en": "Twice a day, after meals. There's no need to finish it all—just stop once she's feeling better.", "zh": "一天兩次，飯後吃。不必全部吃完，等她好轉了就可以停。"}, {"who": "you", "en": "One more thing—we have travel insurance. Could I get a receipt and a diagnosis note so we can file a claim later?", "zh": "還有一件事，我們有旅遊保險。可以給我收據和診斷證明，方便之後申請理賠嗎？"}, {"who": "npc", "en": "Of course. I'll print an itemized receipt along with an English medical report. You pay here first and claim it back once you're home.", "zh": "沒問題。我會印一張明細收據，附上英文診斷報告。你先在這裡付款，回國後再申請理賠。"}]}}, {"id": "emergency", "icon": "🆘", "title": "緊急求助", "titleEn": "Emergency", "desc": "報警、急重症求救、東西遺失、找辦事處", "country": "US", "words": [{"en": "Help!", "zh": "救命！", "ico": "🆘"}, {"en": "ambulance", "zh": "救護車", "ico": "🚑"}, {"en": "police", "zh": "警察", "ico": "👮"}, {"en": "emergency", "zh": "緊急狀況", "ico": "⚠️"}, {"en": "pickpocket", "zh": "扒手", "ico": "🕵️"}, {"en": "unconscious", "zh": "失去意識", "ico": "😵"}, {"en": "allergic reaction", "zh": "過敏反應", "ico": "🤧"}, {"en": "EpiPen", "zh": "腎上腺素筆", "ico": "💉"}, {"en": "interpreter", "zh": "口譯員", "ico": "🗣️"}, {"en": "embassy", "zh": "大使館／辦事處", "ico": "🏛️"}], "patterns": [{"en": "We're near ___.", "zh": "我們在…附近。", "slots": ["the train station", "the main entrance", "Central Park", "the red building"]}, {"en": "He's having ___.", "zh": "他正在…（急症）", "slots": ["a heart attack", "a seizure", "an allergic reaction", "trouble breathing"]}], "phrases": [{"en": "Help!", "zh": "救命！", "tip": "大聲喊出來", "tag": "求救", "level": 1, "survival": true, "homophone": "黑ㄜ普"}, {"en": "I need help, please.", "zh": "請幫幫我。", "tip": "", "tag": "求救", "level": 1, "survival": true, "homophone": "愛 尼德 黑ㄜ普 普利斯"}, {"en": "It's an emergency.", "zh": "這是緊急狀況。", "tip": "emergency = 緊急", "tag": "報警", "level": 1, "survival": true, "homophone": "依次 嗯 伊墨真西"}, {"en": "Call the police!", "zh": "快報警！", "tip": "美國報案打 911", "tag": "報警", "level": 1, "survival": true, "homophone": "摳 勒 波利斯"}, {"en": "Call an ambulance!", "zh": "叫救護車！", "tip": "美國 911 一線通報警與救護", "tag": "報警", "level": 1, "survival": true, "homophone": "摳 嗯 安布勒斯"}, {"en": "I need a doctor.", "zh": "我需要醫生。", "tip": "", "tag": "求救", "level": 1, "survival": true, "homophone": "愛 尼德 阿 搭克特"}, {"en": "He's having a heart attack.", "zh": "他心臟病發作了。", "tip": "heart attack = 心臟病發", "tag": "急重症", "level": 1, "survival": true, "homophone": "喜斯 哈聖 阿 哈特 阿泰克"}, {"en": "She's not breathing.", "zh": "她沒有呼吸了。", "tip": "breathing = 呼吸", "tag": "急重症", "level": 1, "survival": true, "homophone": "需斯 那 布利丁"}, {"en": "He's unconscious.", "zh": "他失去意識了。", "tip": "unconscious = 昏迷", "tag": "急重症", "level": 1, "survival": true, "homophone": "喜斯 安康雪斯"}, {"en": "She's choking.", "zh": "她噎到了（哽住）。", "tip": "choking = 噎到／哽塞", "tag": "急重症", "level": 1, "survival": true, "homophone": "需斯 秋慶"}, {"en": "I'm having an allergic reaction — I need my EpiPen.", "zh": "我過敏發作了，我需要我的腎上腺素筆。", "tip": "EpiPen = 過敏急救腎上腺素筆", "tag": "急重症", "level": 1, "survival": true, "homophone": "愛姆 哈聖 嗯 阿勒吉克 瑞阿克遜 — 愛 尼德 買 艾皮潘"}, {"en": "He's having a seizure.", "zh": "他癲癇發作了。", "tip": "seizure = 抽搐／癲癇發作", "tag": "急重症", "level": 1, "survival": true, "homophone": "喜斯 哈聖 阿 西擷兒"}, {"en": "I'm diabetic.", "zh": "我有糖尿病。", "tip": "diabetic = 糖尿病患；急救時很重要", "tag": "急重症", "level": 1, "survival": true, "homophone": "愛姆 呆阿貝提克"}, {"en": "I'm pregnant.", "zh": "我懷孕了。", "tip": "pregnant = 懷孕；用藥／急救須知", "tag": "急重症", "level": 1, "survival": true, "homophone": "愛姆 普瑞格能特"}, {"en": "Someone snatched my bag!", "zh": "有人搶走我的包包！", "tip": "snatch = 一把搶走，比 took 有力", "tag": "遭竊", "level": 1, "survival": true, "homophone": "桑萬 史那取 買 背格"}, {"en": "I've been pickpocketed!", "zh": "我被扒了！", "tip": "pickpocket = 扒手／扒竊", "tag": "遭竊", "level": 1, "survival": true, "homophone": "愛夫 賓 匹克帕基提"}, {"en": "My wallet was stolen.", "zh": "我的皮夾被偷了。", "tip": "stolen = 被偷（原形 steal）", "tag": "遭竊", "level": 2}, {"en": "I lost my passport.", "zh": "我的護照掉了。", "tip": "換物品：wallet 皮夾／phone 手機", "tag": "遺失", "level": 1}, {"en": "I want to report a theft.", "zh": "我要報案（失竊）。", "tip": "theft = 竊盜", "tag": "報警", "level": 2}, {"en": "We're near the train station.", "zh": "我們在火車站附近。", "tip": "先報位置最重要；套用你所在地標", "tag": "報位置", "level": 1, "survival": true, "homophone": "威爾 尼爾 勒 全 史迪遜"}, {"en": "The address is here on my phone.", "zh": "地址在我手機上。", "tip": "慌亂時直接把手機地址給對方看", "tag": "報位置", "level": 1, "survival": true, "homophone": "勒 阿追斯 伊斯 喜爾 昂 買 風"}, {"en": "Does anyone here speak Chinese?", "zh": "這裡有人會說中文嗎？", "tip": "找到會中文的人能救急", "tag": "語言", "level": 1, "survival": true, "homophone": "達斯 安尼萬 喜爾 斯必克 差伊尼斯"}, {"en": "I need an interpreter.", "zh": "我需要口譯員。", "tip": "interpreter = 口譯員", "tag": "語言", "level": 2, "survival": true, "homophone": "愛 尼德 嗯 因特普特"}, {"en": "My child is missing!", "zh": "我的小孩不見了！", "tip": "missing = 失蹤", "tag": "求救", "level": 1, "survival": true, "homophone": "買 差伊爾德 伊斯 密性"}, {"en": "He's a five-year-old boy in a red shirt.", "zh": "他是個穿紅衣服的五歲男孩。", "tip": "描述走失孩童：年齡＋衣服顏色", "tag": "求救", "level": 2}, {"en": "I'm lost. Can you help me?", "zh": "我迷路了，可以幫我嗎？", "tip": "lost = 迷路", "tag": "求救", "level": 1}, {"en": "Where is the nearest police station?", "zh": "最近的警察局在哪裡？", "tip": "police station = 警察局", "tag": "找地方", "level": 2}, {"en": "Where is the nearest hospital?", "zh": "最近的醫院在哪裡？", "tip": "", "tag": "找地方", "level": 1}, {"en": "No, thank you.", "zh": "不用，謝謝。", "tip": "遇到糾纏／推銷，堅定拒絕", "tag": "自保", "level": 1}, {"en": "Please leave me alone.", "zh": "請別煩我。", "tip": "被騷擾時明確表態", "tag": "自保", "level": 1, "survival": true, "homophone": "普利斯 立夫 密 阿龍"}, {"en": "I'm not interested.", "zh": "我沒興趣。", "tip": "拒絕推銷／搭訕", "tag": "自保", "level": 1}, {"en": "I need to contact the Taiwan representative office.", "zh": "我要聯絡台灣的辦事處。", "tip": "台灣駐外多為 representative office", "tag": "辦事處", "level": 2}, {"en": "Do you have the number for the Taiwan office?", "zh": "你有台灣辦事處的電話嗎？", "tip": "海外急難救助專線 +886-800-085-095", "tag": "辦事處", "level": 2}, {"en": "Please write it down for me.", "zh": "請幫我寫下來。", "tip": "慌亂時最好請對方寫下", "tag": "求救", "level": 1}], "dialogue": {"title": "緊急求助 情境對話", "youRole": "旅客", "npcRole": "警察／救護", "lines": [{"who": "you", "en": "Excuse me, please help us! My father just collapsed and he's having trouble breathing.", "zh": "不好意思，請幫幫我們！我爸爸剛剛突然倒下，現在呼吸很困難。"}, {"who": "npc", "en": "Okay, try to stay calm. Is he awake? Can he still talk to you?", "zh": "好，請盡量冷靜。他還清醒嗎？還能跟你說話嗎？"}, {"who": "you", "en": "He's awake, but he keeps clutching his chest. He has a heart condition.", "zh": "他還清醒，可是一直按著胸口。他有心臟方面的毛病。"}, {"who": "npc", "en": "An ambulance is on the way. Is he on any medication? Do you have it with you?", "zh": "救護車正在趕來。他有在吃什麼藥嗎？藥有帶在身上嗎？"}, {"who": "you", "en": "Yes, these are his heart pills. He took one this morning.", "zh": "有，這是他的心臟藥。他今天早上吃了一顆。"}, {"who": "npc", "en": "Good, that helps a lot. The paramedics will be here in about three minutes. Stay with him.", "zh": "很好，這幫了大忙。急救人員大約三分鐘後就到，請陪在他身邊。"}, {"who": "you", "en": "Thank you. And there's one more thing — while we were running for help, my wife's bag was stolen. Her passport was inside.", "zh": "謝謝你。還有一件事——我們剛剛跑去求救的時候，我太太的包包被偷了，護照就在裡面。"}, {"who": "npc", "en": "I'm sorry to hear that. You'll need to file a report. Did you see who took it?", "zh": "我很遺憾。這你需要報案做筆錄。你有看到是誰拿走的嗎？"}, {"who": "you", "en": "No, it happened so fast. We didn't see anything.", "zh": "沒有，發生得太快了，我們什麼都沒看到。"}, {"who": "npc", "en": "That's okay. I'll write up the report now and give you a copy. Keep it somewhere safe.", "zh": "沒關係。我現在就幫你做報案紀錄，會給你一份副本，請收好。"}, {"who": "you", "en": "Thank you so much. Where can we get a new passport? Is there a Taiwan office near here?", "zh": "非常感謝。我們要去哪裡辦新護照？這附近有台灣的辦事處嗎？"}, {"who": "npc", "en": "Yes, there's a Taiwan representative office downtown. Show them this police report, and they'll help you.", "zh": "有的，市中心就有一間台灣辦事處。把這份報案紀錄拿給他們看，他們會協助你們。"}]}}, {"id": "safety", "icon": "🛡️", "title": "防扒與自保", "titleEn": "Safety & Scams", "desc": "防扒手、拒絕推銷搭訕、報平安、借用求助", "country": "US", "words": [{"en": "pickpocket", "zh": "扒手", "ico": "🖐️"}, {"en": "scam", "zh": "詐騙", "ico": "⚠️"}, {"en": "wallet", "zh": "皮夾", "ico": "👛"}, {"en": "taxi", "zh": "計程車", "ico": "🚕"}, {"en": "emergency", "zh": "緊急狀況", "ico": "🆘"}, {"en": "suspicious", "zh": "可疑的", "ico": "👀"}, {"en": "police", "zh": "警察", "ico": "👮"}, {"en": "phone", "zh": "手機", "ico": "📱"}], "patterns": [{"en": "Please ___.", "zh": "請…。", "slots": ["leave me alone", "call me a taxi", "watch my bags for a second"]}, {"en": "No, ___.", "zh": "不用了，…。", "slots": ["thank you", "I'm not interested"]}], "phrases": [{"en": "No, thank you.", "zh": "不用了，謝謝。", "tip": "堅定但有禮貌", "tag": "拒絕", "level": 1, "survival": true, "homophone": "弄，山Q"}, {"en": "I'm not interested.", "zh": "我沒興趣。", "tip": "interested = 有興趣的", "tag": "拒絕", "level": 1}, {"en": "Please leave me alone.", "zh": "請別再纏著我。", "tip": "被糾纏時用，語氣要堅定", "tag": "拒絕", "level": 1, "survival": true, "homophone": "普利斯 立夫 米 額弄"}, {"en": "I've been pickpocketed!", "zh": "我被扒了！", "tip": "pickpocket = 扒手", "tag": "遭竊", "level": 2, "survival": true, "homophone": "愛夫 賓 匹克帕基特"}, {"en": "Someone stole my wallet!", "zh": "有人偷了我的皮夾！", "tip": "stole = steal 的過去式", "tag": "遭竊", "level": 2}, {"en": "Keep your hands off my bag!", "zh": "把手拿開，別碰我的包！", "tip": "察覺有人靠太近時大聲說", "tag": "遭竊", "level": 2}, {"en": "Can I use your phone? It's an emergency.", "zh": "可以借用你的手機嗎？這是緊急狀況。", "tip": "報平安或報警都用得到", "tag": "求助", "level": 2, "survival": true, "homophone": "坎 愛 又斯 幼兒 風？依次 恩 伊墨真西"}, {"en": "Where can I charge my phone?", "zh": "哪裡可以幫手機充電？", "tip": "charge = 充電", "tag": "手機", "level": 1}, {"en": "Can you call me a taxi?", "zh": "可以幫我叫計程車嗎？", "tip": "call a taxi = 叫車", "tag": "交通", "level": 2}, {"en": "Please watch my bags for a second.", "zh": "請幫我顧一下行李。", "tip": "for a second = 一下下", "tag": "財物", "level": 2}, {"en": "Is this area safe at night?", "zh": "這一帶晚上安全嗎？", "tip": "safe = 安全的", "tag": "安全", "level": 2}, {"en": "Sorry, I don't do surveys.", "zh": "抱歉，我不填問卷。", "tip": "假問卷常是分心扒竊手法", "tag": "防詐", "level": 2}, {"en": "Can I see your police ID, please?", "zh": "可以出示你的警察證件嗎？", "tip": "假警察會要你交錢包，先驗證件", "tag": "防詐", "level": 3}, {"en": "I'm not buying anything, thank you.", "zh": "我什麼都不買，謝謝。", "tip": "面對強迫推銷，重複同一句就好", "tag": "拒絕", "level": 2}, {"en": "I'm meeting my friends over there.", "zh": "我朋友在那邊等我。", "tip": "讓對方知道你不是落單，方便脫身", "tag": "自保", "level": 2}, {"en": "I need to report a theft.", "zh": "我要報案（失竊）。", "tip": "theft = 竊盜", "tag": "報警", "level": 2}], "dialogue": {"title": "防扒與自保 情境對話", "youRole": "旅客", "npcRole": "路人／警察", "lines": [{"who": "npc", "en": "Excuse me! Hey, my friend! Where you from? Taiwan? Ah, I love Taiwan! Come, come, I show you a shop — very cheap, special price just for you.", "zh": "不好意思！嘿，朋友！你們從哪來的？台灣？啊，我超愛台灣！來來來，我帶你們去一家店，超便宜，只給你們的特價喔。"}, {"who": "you", "en": "No, thank you. We're just looking around. Please don't follow us.", "zh": "不用了，謝謝。我們只是隨便逛逛，請不要跟著我們。"}, {"who": "npc", "en": "Just one minute! Look, look at this map. Where you want to go? Let me help you — come closer.", "zh": "就一分鐘！你看、你看這張地圖。你們想去哪？我幫你們——靠過來一點嘛。"}, {"who": "you", "en": "Please give us some space, we're fine. Kids, hold my hand and move your backpacks around to the front.", "zh": "請退後一點，我們沒事。孩子們，牽好我的手，把背包轉到胸前來背。"}, {"who": "npc", "en": "Hey, sorry to jump in — I saw that guy hassling you. Just so you know, he's not really selling anything; he works with the pickpockets around here. Keep your wallet zipped, and don't take your phone out right here.", "zh": "嘿，不好意思插句話——我看到那個人一直纏著你們。跟你們說一聲，他其實不是真的在賣東西，是跟這附近的扒手一夥的。錢包拉鍊拉好，也先別在這裡把手機拿出來。"}, {"who": "you", "en": "Oh, really? Thank you so much for the heads-up. Is this whole area like that?", "zh": "喔，真的嗎？太謝謝你提醒我們了。這一整區都是這樣嗎？"}, {"who": "npc", "en": "Most of it's fine, but watch out on the metro. When it gets crowded, that's when they bump into you and lift your stuff.", "zh": "大部分地方還好，不過搭地鐵要小心。人一擠的時候，他們就會故意撞你，順手把東西摸走。"}, {"who": "you", "en": "Got it, we'll be careful. I should text my mom to let her know we're safe — oh no, my phone just died.", "zh": "了解，我們會小心。我得傳個訊息跟我媽報平安——糟糕，我手機剛好沒電了。"}, {"who": "npc", "en": "There's a café right over there. The staff are friendly — they'll probably let you charge it for a bit.", "zh": "那邊就有一家咖啡廳。店員人很好，應該會讓你們充一下電。"}, {"who": "you", "en": "Excuse me, sorry to bother you. Could I use an outlet to charge my phone for a few minutes? I just need to text my mom that we're okay.", "zh": "不好意思，打擾一下。我可以借個插座充一下手機幾分鐘嗎？我只是想傳訊息跟我媽報平安。"}, {"who": "npc", "en": "Of course. There's an outlet by the window seat. Take your time, no rush.", "zh": "當然可以。窗邊的位子那邊有插座。慢慢來，不用急。"}, {"who": "you", "en": "Thank you, you've really saved us. Let me order a couple of coffees while we wait — it's the least we can do.", "zh": "謝謝你，真是幫了我們大忙。趁充電的時候我點兩杯咖啡吧，這是我們的一點心意。"}]}}];
</script>

<script>
const SCENARIOS = window.__SCENARIOS__;
const REF = window.__REF__;
const $ = s=>document.querySelector(s);
const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const todayStr=()=>fmt(new Date());

const BANDS={
  all:{name:"一般",emoji:"🙂",desc:"全部關卡與難度",levels:[1,2,3],hide:[],big:false,homo:false},
  senior:{name:"長輩",emoji:"👵",desc:"只留最基礎救命句、大字、諧音發音",levels:[1],hide:["car-rental","driving-gas","sim-internet","money","flight-trouble"],big:true,homo:true},
  kid:{name:"兒童",emoji:"🧒",desc:"藏大人關卡，只練簡單句＋遊戲",levels:[1,2],hide:["car-rental","driving-gas","sim-internet","money","flight-trouble"],big:false,homo:false},
  adult:{name:"成人",emoji:"💼",desc:"全部關卡與進階句，高效實用",levels:[1,2,3],hide:[],big:false,homo:false}
};
function band(){return BANDS[S.band]||BANDS.all}
function scenList(){return SCENARIOS.filter(sc=>!band().hide.includes(sc.id))}
function phraseOK(p){return band().levels.includes(p.level||2)||p.survival}
function visPhrases(sc){return sc.phrases.map((p,i)=>({p,i})).filter(o=>phraseOK(o.p))}

const G = JSON.parse(localStorage.getItem('trip_en_global')||'null') || {
  profiles:[{id:'p1',name:'我',emoji:'🙂'}], current:'p1', dark:false
};
function saveG(){localStorage.setItem('trip_en_global',JSON.stringify(G))}

let S;
function pKey(id){return 'trip_en_'+id}
function loadProfile(id){
  S = JSON.parse(localStorage.getItem(pKey(id))||'null') || {};
  S.cards=S.cards||{}; S.favs=S.favs||[]; S.streakDates=S.streakDates||[]; S.dailyCount=S.dailyCount||{};
  S.goal=S.goal||20; S.rate=S.rate||1.0; S.showZh=S.showZh!==false; S.band=S.band||'all'; S.big=!!S.big; S.badges=S.badges||[];
}
function saveS(){localStorage.setItem(pKey(G.current),JSON.stringify(S))}

function cardKey(sid,i){return sid+'#'+i}
function getCard(sid,i){const k=cardKey(sid,i);return S.cards[k]||(S.cards[k]={lvl:0,due:0,seen:0})}
const SRS_DAYS=[0,1,2,4,8,16,30];
function grade(sid,i,ok){
  const c=getCard(sid,i);c.seen++;
  if(ok){c.lvl=Math.min(6,c.lvl+1);c.due=Date.now()+SRS_DAYS[c.lvl]*864e5;}
  else{c.lvl=Math.max(0,c.lvl-1);c.due=Date.now()+6e5;}
  countStudy();saveS();
}
function countStudy(){const t=todayStr();S.dailyCount[t]=(S.dailyCount[t]||0)+1;if(!S.streakDates.includes(t))S.streakDates.push(t);}
function streak(){
  const set=new Set(S.streakDates);let n=0;const d=new Date();let key=todayStr();
  if(!set.has(key)){d.setDate(d.getDate()-1);key=fmt(d);if(!set.has(key))return 0;}
  while(set.has(key)){n++;d.setDate(d.getDate()-1);key=fmt(d);}
  return n;
}
function totalStars(){let s=0;for(const k in S.cards)s+=S.cards[k].lvl;return s}
function dueCards(){
  const now=Date.now();const out=[];
  scenList().forEach(sc=>visPhrases(sc).forEach(o=>{const c=S.cards[cardKey(sc.id,o.i)];if(c&&c.seen>0&&c.due<=now)out.push({sc,p:o.p,i:o.i});}));
  return out;
}
function scenarioPct(sc){
  const vis=visPhrases(sc);if(!vis.length)return 0;
  let done=0;vis.forEach(o=>{const c=S.cards[cardKey(sc.id,o.i)];if(c&&c.lvl>=3)done++;});
  return Math.round(done/vis.length*100);
}

let voice=null;
function pickVoice(){const vs=speechSynthesis.getVoices();
  voice=vs.find(v=>/en[-_]US/i.test(v.lang)&&/female|samantha|zira|aria|jenny/i.test(v.name))||vs.find(v=>/en[-_]US/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||null;}
if('speechSynthesis'in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function say(text,rate){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=rate||S.rate||1;if(voice)u.voice=voice;
  speechSynthesis.speak(u);
}

let view='home';
const VIEWS=['home','detail','sos','search','fav','profile'];
function setNav(active){['home','review','sos','search','profile'].forEach(x=>{const b=$('#nav-'+x);if(b)b.classList.toggle('on',x===active)});}
function go(v){
  view=v;VIEWS.forEach(x=>$('#view-'+x).classList.toggle('hidden',x!==v));
  setNav(v==='fav'?'':v);
  if(v==='home')renderHome();
  if(v==='sos')renderSOS();
  if(v==='fav')renderFav();
  if(v==='profile')renderProfile();
  if(v==='search'){$('#searchInput').value='';$('#searchRes').innerHTML='';setTimeout(()=>$('#searchInput').focus(),100)}
  window.scrollTo(0,0);
}

function renderTopStats(){
  const p=G.profiles.find(x=>x.id===G.current);
  $('#profChip').textContent=(p?p.emoji+' '+p.name:'👤')+' · '+band().name;
  $('#stStreak').textContent=streak();$('#stStars').textContent=totalStars();
  $('#stToday').textContent=S.dailyCount[todayStr()]||0;$('#stGoal').textContent=S.goal;
  $('#stDue').textContent=dueCards().length;
}
function renderHome(){
  renderTopStats();
  const due=dueCards().length,done=S.dailyCount[todayStr()]||0;
  let b='';
  if(due>0)b+=`<div class="banner rev"><div class="big">🔁</div><div class="t"><b>今天有 ${due} 張卡該複習</b><small>趁記憶還在時複習最有效</small></div><button class="go" onclick="startReview()">開始</button></div>`;
  if(done<S.goal)b+=`<div class="banner"><div class="big">🎯</div><div class="t"><b>今日進度 ${done}/${S.goal}</b><small>再練 ${S.goal-done} 張就達標，維持連續打卡 🔥</small></div><button class="go" onclick="startDaily()">今日練習</button></div>`;
  else b+=`<div class="banner"><div class="big">🎉</div><div class="t"><b>今日目標達成！${streak()} 天連續</b><small>還想練可繼續挑戰任一關卡</small></div></div>`;
  b+=`<div class="banner sos"><div class="big">🆘</div><div class="t"><b>救命短句・出國隨身</b><small>報案電話、過敏發作、被扒、迷路…一頁搞定</small></div><button class="go" onclick="go('sos')">打開</button></div>`;
  $('#dailyBanner').innerHTML=b;
  const list=scenList();
  $('#gridTitle').textContent=`🗺️ 情境關卡（${band().emoji} ${band().name}模式 · ${list.length} 關）`;
  $('#grid').innerHTML=list.map(sc=>{
    const pct=scenarioPct(sc);
    return `<button class="scard" onclick="openScenario('${sc.id}')">
      <div class="ico">${sc.icon}</div>
      ${pct>=100?'<div class="done-badge">🏅</div>':pct>0?`<div class="pct">${pct}%</div>`:''}
      <div class="nm">${sc.title}</div><div class="en">${sc.titleEn}</div>
      <div class="desc">${sc.desc||''}</div>
      <div class="pbar"><i style="width:${pct}%"></i></div></button>`;
  }).join('');
}

function renderSOS(){
  renderTopStats();setNav('sos');
  const surv=[];scenList().forEach(sc=>sc.phrases.forEach((p,i)=>{if(p.survival)surv.push({sc,p,i})}));
  let h=`<div class="section-title">🆘 救命 & 生存短句</div>
    <p style="color:var(--sub);font-size:.82rem;margin:0 4px 10px">出國最該會的句子，短到能背、能指著講。點 🔊 聽發音。</p>`;
  h+=surv.map(o=>`<div class="pitem sos-item"><div class="body">

let curScenario=null, curTag='全部';

const NUMRE=/\b(\d[\d:.,]*|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|twenty|thirty|forty|fifty|sixty|seventy|eighty|ninety|hundred|midnight|noon)\b/i;
function hasNumbers(sc){return sc.phrases.some(p=>phraseOK(p)&&NUMRE.test(p.en))}
function renderDetail(){

    ${sc.dialogue&&sc.dialogue.lines&&sc.dialogue.lines.length?`<button class="mode" onclick="startRoleplay()"><div class="mi">🎭</div><div class="ml">角色扮演</div></button>`:''}

}

function stars(lvl){return '★'.repeat(lvl)+'☆'.repeat(Math.max(0,5-lvl))}
function phraseItem(sc,p,i){

function doSearch(q){

    hits.slice(0,60).map(o=>`<div style="font-size:.7rem;color:var(--sub);margin:8px 2px 2px">${o.sc.icon} ${o.sc.title}</div>`+phraseItem(o.sc,o.p,o.i)).join('');

let Q=null;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function scenItems(sc,filter){let it=visPhrases(sc).map(o=>({sc,p:o.p,i:o.i}));if(filter)it=it.filter(filter);return shuffle(it);}
function buildQueue(mode,sc,filter){return{mode,items:scenItems(sc,filter),idx:0,correct:0,sid:sc.id};}

function startMode(mode){
  let filter=null;
  if(mode==='dictation')filter=o=>NUMRE.test(o.p.en);

  renderCard();

function startDaily(){
  const pool=[];const now=Date.now();
  scenList().forEach(sc=>visPhrases(sc).forEach(o=>{const c=S.cards[cardKey(sc.id,o.i)];const pr=(!c)?1:(c.due<=now?0:2);pool.push({sc,p:o.p,i:o.i,pr,due:c?c.due:0});}));
  pool.sort((a,b)=>a.pr-b.pr||a.due-b.due);
  Q={mode:'learn',items:shuffle(pool.slice(0,Math.max(S.goal,10))),idx:0,correct:0,sid:null,daily:true};renderCard();
}

}
function renderCard(){

function makeOptions(p,field){

function pickOpt(el,correct){

    setTimeout(()=>{Q.idx++;renderCard()},750);

function extractNum(en){const m=en.match(NUMRE);return m?m[0]:null;}

let scz={};
function cardScramble(){

function sczPick(k){scz.target.push(scz.pool.splice(k,1)[0]);drawScramble(Q.items[Q.idx].p);}

let recog=null,recSupported=('webkitSpeechRecognition'in window)||('SpeechRecognition'in window);
function cardShadow(){
  const{p}=Q.items[Q.idx];
  const inner=`<div class="mic-wrap">
    <div class="big-en" style="font-size:1.5rem;font-weight:800">${p.en}</div>

    <div class="heard" id="heard">${recSupported?'點麥克風，唸出上面的句子':'此裝置不支援語音辨識，改用聽發音跟著唸'}</div>
    <div id="scoreArea"></div></div>`;
  const foot=recSupported?`<button class="pbtn ghost" onclick="say(${esc(p.en)})">🔊 聽範例</button><button class="pbtn" onclick="Q.idx++;renderCard()">跳過 ›</button>`

function toggleRec(){
  if(!recSupported)return;const R=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(recog){recog.stop();return;}
  recog=new R();recog.lang='en-US';recog.interimResults=false;recog.maxAlternatives=1;
  $('#micBtn').classList.add('rec');$('#heard').textContent='🔴 聽你說…請開口';
  recog.onresult=e=>scoreShadow(e.results[0][0].transcript);
  recog.onerror=()=>{$('#heard').textContent='沒聽清楚，再試一次';};
  recog.onend=()=>{const m=$('#micBtn');if(m)m.classList.remove('rec');recog=null;};
  try{recog.start();}catch(e){}
}
function normalize(s){return s.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim()}
function scoreShadow(said){
  const cur=Q.items[Q.idx];const tw=normalize(cur.p.en).split(' '),hw=new Set(normalize(said).split(' '));
  let hit=0;tw.forEach(w=>{if(hw.has(w))hit++});const score=Math.round(hit/tw.length*100);
  $('#heard').innerHTML=`你說：<b>${said}</b>`;
  const cls=score>=80?'w-good':score>=50?'w-mid':'w-bad';const msg=score>=80?'太棒了！發音很清楚 🎉':score>=50?'不錯，再唸一次更好 💪':'再試一次，放慢一點 🙂';
  $('#scoreArea').innerHTML=`<div class="scorebig ${cls}">${score}<span style="font-size:1.3rem">分</span></div><div class="qsub">${msg}</div>`;
  const ok=score>=60;grade(cur.sc.id,cur.i,ok);if(ok)Q.correct++;if(score>=80)heart($('#micBtn'));
  $('#ovfoot').innerHTML=`<button class="pbtn ghost" onclick="say(${esc(cur.p.en)})">🔊 範例</button><button class="pbtn" onclick="Q.idx++;renderCard()">下一題 ›</button>`;
}

function drawPattern(){
  if(PQ.idx>=PQ.pats.length){PQ=null;$('#overlayMount').innerHTML='';renderDetail();toast('句型練習完成！一個框架能講很多句 🔑');return;}
  const pat=PQ.pats[PQ.idx];const slot=pat.slots[PQ.pick]||pat.slots[0];
  const full=pat.en.replace('___',slot);
  const inner=`<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px">
    <div class="patcard"><div class="frame">${pat.en.replace('___',`<span class="slot">${slot}</span>`)}</div><div style="color:var(--sub)">${pat.zh}</div>
      <button class="speak" style="margin-top:14px" onclick="say(${esc(full)})">🔊 ${full}</button></div>
    <div style="text-align:center;color:var(--sub);font-size:.85rem">👇 換不同的字，同一句型變出很多句</div>
    <div class="slotbtns">${pat.slots.map((s,k)=>`<button class="slotbtn ${k===PQ.pick?'on':''}" onclick="PQ.pick=${k};drawPattern()">${s}</button>`).join('')}</div></div>`;
  $('#overlayMount').innerHTML=`<div class="overlay"><div class="ovhead"><button class="x" onclick="PQ=null;closeOverlay()">✕</button><div class="ovprog"><i style="width:${Math.round(PQ.idx/PQ.pats.length*100)}%"></i></div><div class="cnt">🔑 ${PQ.idx+1}/${PQ.pats.length}</div></div><div class="ovbody">${inner}</div><div class="ovfoot"><button class="pbtn" onclick="PQ.idx++;PQ.pick=0;drawPattern()">下一個句型 ›</button></div></div>`;
  say(full);
}

let RP=null;
function pickLine(l){if(l.who==='npc'&&l.alt&&l.alt.length&&Math.random()<0.5){const a=l.alt[Math.floor(Math.random()*l.alt.length)];return{who:'npc',en:a.en,zh:a.zh};}return l;}
function startRoleplay(){
  const d=curScenario.dialogue;if(!d||!d.lines||!d.lines.length){toast('這關暫無對話');return}
  RP={d,step:0,resolved:d.lines.map(pickLine)};drawRoleplay();
}
function drawRoleplay(){
  const{d,resolved}=RP;const shown=resolved.slice(0,RP.step);
  const chat=shown.map(l=>`<div class="bubble ${l.who}">${l.en}<div class="z">${l.zh}</div></div>`).join('');
  let foot='',bottom='';
  if(RP.step>=resolved.length){foot=`<button class="pbtn ghost" onclick="closeOverlay()">完成</button><button class="pbtn" onclick="RP.step=0;RP.resolved=RP.d.lines.map(pickLine);drawRoleplay()">再玩一次</button>`;}
  else{const nxt=resolved[RP.step];
    if(nxt.who==='you'){bottom=`<div class="roleask">👉 換你了（你扮演：${d.youRole}）— 試著說出來，再看解答</div>`;foot=`<button class="pbtn ghost" onclick="say(${esc(nxt.en)})">🔊 提示</button><button class="pbtn" onclick="rpAdvance()">看解答 ›</button>`;}
    else{bottom=`<div class="roleask">🗣️ ${d.npcRole} 說話中…</div>`;foot=`<button class="pbtn" onclick="rpAdvance()">繼續 ›</button>`;}}
  const inner=`<div style="text-align:center;margin-bottom:6px"><b>${d.title}</b><div class="qsub">你：${d.youRole} ｜ 對方：${d.npcRole}</div></div><div class="chat">${chat||'<div class="qsub">點「繼續」展開對話</div>'}</div>${bottom}`;
  $('#overlayMount').innerHTML=`<div class="overlay"><div class="ovhead"><button class="x" onclick="closeOverlay()">✕</button><div class="ovprog"><i style="width:${Math.round(RP.step/resolved.length*100)}%"></i></div><div class="cnt">🎭</div></div><div class="ovbody">${inner}</div><div class="ovfoot">${foot}</div></div>`;
  const last=shown[shown.length-1];if(last&&last.who==='npc')say(last.en);
  const body=$('.chat');if(body)body.scrollTop=body.scrollHeight;
}
function rpAdvance(){const l=RP.resolved[RP.step];RP.step++;if(l.who==='you'){countStudy();saveS();}drawRoleplay();}

let RS=null;
function startRespond(){
  const d=curScenario.dialogue;if(!d||!d.lines)return;
  const pairs=[];for(let i=0;i<d.lines.length-1;i++){if(d.lines[i].who==='npc'&&d.lines[i+1].who==='you')pairs.push({npc:d.lines[i],you:d.lines[i+1]});}
  if(!pairs.length){toast('這關暫無適合的應答練習');return}
  RS={pairs:shuffle(pairs),idx:0};drawRespond(false);
}
function drawRespond(revealed){
  if(RS.idx>=RS.pairs.length){RS=null;$('#overlayMount').innerHTML='';renderDetail();toast('應答練習完成！臨場反應更快了 💬');return;}
  const pr=RS.pairs[RS.idx];const pct=Math.round(RS.idx/RS.pairs.length*100);
  let body=`<div style="flex:1;display:flex;flex-direction:column;gap:14px;justify-content:center">
    <div class="qsub">🗣️ 對方對你說（點播放來聽）：</div>
    <div class="bubble npc" style="max-width:100%">${pr.npc.en}<div class="z">${pr.npc.zh}</div></div>
    <div style="text-align:center"><button class="speak" onclick="say(${esc(pr.npc.en)})">🔊 再聽一次</button></div>`;
  if(!revealed){body+=`<div class="roleask">👉 換你回答！${recSupported?'點麥克風說說看':'想好你會怎麼回，再看參考'}</div>
    ${recSupported?`<div style="text-align:center"><button class="mic" style="width:74px;height:74px;font-size:30px;margin:0 auto" id="rsMic" onclick="rsRec()">🎤</button><div class="heard" id="rsHeard"></div></div>`:''}`;}
  else{body+=`<div class="roleask">✅ 參考回答：</div><div class="bubble you" style="max-width:100%;align-self:flex-end">${pr.you.en}<div class="z">${pr.you.zh}</div></div>`;}
  body+='</div>';
  const foot=revealed?`<button class="pbtn ghost" onclick="say(${esc(pr.you.en)})">🔊 聽參考</button><button class="pbtn" onclick="RS.idx++;countStudy();saveS();drawRespond(false)">下一題 ›</button>`
    :`<button class="pbtn" onclick="drawRespond(true)">看參考回答 ›</button>`;
  $('#overlayMount').innerHTML=`<div class="overlay"><div class="ovhead"><button class="x" onclick="RS=null;closeOverlay()">✕</button><div class="ovprog"><i style="width:${pct}%"></i></div><div class="cnt">💬 ${RS.idx+1}/${RS.pairs.length}</div></div><div class="ovbody">${body}</div><div class="ovfoot">${foot}</div></div>`;
  say(pr.npc.en);
}
function rsRec(){
  if(!recSupported)return;const R=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rr=new R();rr.lang='en-US';rr.interimResults=false;
  $('#rsMic').classList.add('rec');$('#rsHeard').textContent='🔴 聽你說…';
  rr.onresult=e=>{$('#rsHeard').innerHTML=`你說：<b>${e.results[0][0].transcript}</b> 👍`;};
  rr.onerror=()=>{$('#rsHeard').textContent='沒聽清楚，再試一次';};
  rr.onend=()=>{const m=$('#rsMic');if(m)m.classList.remove('rec');};
  try{rr.start();}catch(e){}
}

function finishSession(){
  const total=Q.items.length,correct=Q.correct,pct=total?Math.round(correct/total*100):0;
  const star=pct>=90?'🏆':pct>=70?'🌟':'👍';confetti();
  const inner=`<div class="flash"><div style="font-size:64px">${star}</div><div class="big-en">完成！</div>
    <div class="card3d" style="min-height:auto;gap:8px"><div style="font-size:.95rem;color:var(--sub)">答對 <b style="color:var(--good);font-size:1.4rem">${correct}</b> / ${total} 題</div>
    <div style="font-size:.95rem;color:var(--sub)">今日累積 <b style="color:var(--sky)">${S.dailyCount[todayStr()]||0}</b> 張 · 連續 <b style="color:var(--gold)">${streak()}</b> 天 🔥</div></div></div>`;
  $('#overlayMount').innerHTML=ovShell(inner,`<button class="pbtn ghost" onclick="closeOverlay()">完成</button>${Q.sid?`<button class="pbtn" onclick="restartSame()">再練一次</button>`:''}`);
  saveS();awardBadges();
}
function restartSame(){const sc=SCENARIOS.find(s=>s.id===Q.sid);const m=Q.mode;Q=buildQueue(m,sc);renderCard();}

const MILESTONES=[{id:'streak3',emoji:'🔥',name:'連續3天',test:()=>streak()>=3},{id:'streak7',emoji:'⚡',name:'連續7天',test:()=>streak()>=7},{id:'streak30',emoji:'👑',name:'連續30天',test:()=>streak()>=30},{id:'star50',emoji:'⭐',name:'50顆星',test:()=>totalStars()>=50},{id:'star200',emoji:'🌟',name:'200顆星',test:()=>totalStars()>=200},{id:'sos',emoji:'🆘',name:'救命達人',test:()=>{let n=0;SCENARIOS.forEach(sc=>sc.phrases.forEach((p,i)=>{if(p.survival){const c=S.cards[cardKey(sc.id,i)];if(c&&c.lvl>=3)n++}}));return n>=15}}];
function earnedBadges(){
  const got=new Set(S.badges);
  SCENARIOS.forEach(sc=>{if(scenarioPct(sc)>=100)got.add('sc_'+sc.id);});
  MILESTONES.forEach(m=>{if(m.test())got.add(m.id);});
  return got;
}
function awardBadges(){
  const got=earnedBadges();const fresh=[...got].filter(b=>!S.badges.includes(b));
  if(fresh.length){S.badges=[...got];saveS();
    const b=fresh[0];const sc=SCENARIOS.find(s=>'sc_'+s.id===b);const m=MILESTONES.find(x=>x.id===b);
    toast('🏅 獲得徽章：'+(sc?sc.icon+' '+sc.title+'達人':(m?m.emoji+' '+m.name:'新成就')));confetti();
  }
}
function renderBadges(){
  const got=earnedBadges();
  const scB=SCENARIOS.map(sc=>({emoji:sc.icon,name:sc.title,got:got.has('sc_'+sc.id)}));
  const msB=MILESTONES.map(m=>({emoji:m.emoji,name:m.name,got:got.has(m.id)}));
  const all=[...msB,...scB];
  $('#badges').innerHTML=all.map(b=>`<div class="badge ${b.got?'got':''}"><div class="bi">${b.emoji}</div><div class="bn">${b.name}</div></div>`).join('');
}

function esc(s){return "'"+String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")+"'"}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),1800)}
function heart(el){if(!el)return;const r=el.getBoundingClientRect();const h=document.createElement('div');h.className='pop-heart';h.textContent='❤️';h.style.left=r.left+r.width/2-15+'px';h.style.top=r.top+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),1000)}
function confetti(){for(let i=0;i<24;i++){const c=document.createElement('div');c.className='pop-heart';c.textContent=['🎉','⭐','✨','🎊','💙'][i%5];c.style.left=Math.random()*100+'vw';c.style.top=Math.random()*40+10+'vh';c.style.animationDelay=Math.random()*.3+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),1200)}}

function renderProfile(){
  renderTopStats();setNav('profile');
  $('#profList').innerHTML=G.profiles.map(p=>`<button class="pill ${p.id===G.current?'on':''}" onclick="switchProfile('${p.id}')" ondblclick="renameProfile('${p.id}')">${p.emoji} ${p.name}${G.profiles.length>1?` <span onclick="event.stopPropagation();delProfile('${p.id}')" style="color:var(--bad);margin-left:4px">✕</span>`:''}</button>`).join('');
  $('#bandSel').innerHTML=Object.keys(BANDS).map(k=>`<button class="bandopt ${S.band===k?'on':''}" onclick="setBand('${k}')"><b>${BANDS[k].emoji} ${BANDS[k].name}</b><small>${BANDS[k].desc}</small></button>`).join('');
  renderBadges();
  $('#goalView').textContent=S.goal;$('#rateView').textContent=S.rate.toFixed(1)+'×';
  $('#swBig').classList.toggle('on',S.big);$('#swDark').classList.toggle('on',G.dark);$('#swZh').classList.toggle('on',S.showZh);
  let seen=0,mastered=0,tot=0;
  scenList().forEach(sc=>visPhrases(sc).forEach(o=>{tot++;const c=S.cards[cardKey(sc.id,o.i)];if(c&&c.seen)seen++;if(c&&c.lvl>=5)mastered++;}));
  $('#progSummary').innerHTML=`
    <div class="setrow"><div class="lab"><b>已學過</b><small>目前模式可見的句子</small></div><b style="color:var(--sky)">${seen} / ${tot}</b></div>
    <div class="setrow"><div class="lab"><b>已精熟 ★★★★★</b></div><b style="color:var(--gold)">${mastered}</b></div>
    <div class="setrow"><div class="lab"><b>收藏句數</b></div><b>${S.favs.length}</b></div>
    <div class="setrow"><div class="lab"><b>連續打卡</b></div><b style="color:var(--bad)">${streak()} 天 🔥</b></div>`;
}
function setBand(k){S.band=k;S.big=BANDS[k].big;saveS();applyBig();renderProfile();toast(BANDS[k].emoji+' 已切換到「'+BANDS[k].name+'」模式');}
function switchProfile(id){G.current=id;saveG();loadProfile(id);applyBig();renderProfile();}
function addProfile(){const name=prompt('成員名字？（例：爸爸、小明、阿嬤）');if(!name)return;const emojis=['🙂','😎','🧑','👦','👧','👨','👩','👵','👴','🐣'];const id='p'+Date.now();G.profiles.push({id,name:name.trim().slice(0,6),emoji:emojis[G.profiles.length%emojis.length]});G.current=id;saveG();loadProfile(id);applyBig();renderProfile();renderTopStats();}
function renameProfile(id){const p=G.profiles.find(x=>x.id===id);const n=prompt('改名字：',p.name);if(n){p.name=n.trim().slice(0,6);saveG();renderProfile()}}
function delProfile(id){if(G.profiles.length<=1)return;if(!confirm('刪除這位成員與其進度？'))return;G.profiles=G.profiles.filter(p=>p.id!==id);localStorage.removeItem(pKey(id));if(G.current===id)G.current=G.profiles[0].id;saveG();loadProfile(G.current);applyBig();renderProfile();renderTopStats();}
function setGoal(d){S.goal=Math.max(5,Math.min(100,S.goal+d));saveS();renderProfile();}
function setRate(d){S.rate=Math.max(.5,Math.min(1.5,+(S.rate+d).toFixed(1)));saveS();$('#rateView').textContent=S.rate.toFixed(1)+'×';say('Hello, this is the speed.');}
function toggleBig(){S.big=!S.big;saveS();applyBig();$('#swBig').classList.toggle('on',S.big);}
function applyBig(){document.body.classList.toggle('big',S.big);}
function toggleDark(){G.dark=!G.dark;saveG();applyDark();$('#swDark').classList.toggle('on',G.dark);}
function applyDark(){document.documentElement.setAttribute('data-theme',G.dark?'dark':'light');document.querySelector('meta[name=theme-color]').content=G.dark?'#0b1220':'#0ea5e9';}
function toggleZh(){S.showZh=!S.showZh;saveS();$('#swZh').classList.toggle('on',S.showZh);}
function resetProgress(){if(!confirm('清空此成員所有學習進度？此動作無法復原'))return;const keep={goal:S.goal,rate:S.rate,showZh:S.showZh,band:S.band,big:S.big};S={cards:{},favs:[],streakDates:[],dailyCount:{},badges:[],...keep};saveS();renderProfile();renderTopStats();}

loadProfile(G.current);applyDark();applyBig();renderHome();

/* ===== 離線快取 + 安裝到桌面 (PWA) ===== */
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
(function(){
  var dp=null;
  function iss(){return (window.matchMedia&&matchMedia('(display-mode: standalone)').matches)||navigator.standalone===true;}
  function iios(){return /iphone|ipad|ipod/i.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);}
  function ren(){var el=document.getElementById('installBar');if(!el)return;
    if(iss()){el.innerHTML='';return;}
    if(dp){el.innerHTML='<button class="ib" onclick="__inst()">📲 安裝到桌面（免開瀏覽器） ➕</button>';}
    else if(iios()){el.innerHTML='<button class="ib sec" onclick="__instIOS()">📲 安裝到主畫面（iPad / iPhone） ›</button>';}
    else{el.innerHTML='';}}
  window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;ren();});
  window.addEventListener('appinstalled',function(){dp=null;ren();});
  window.__inst=function(){if(!dp)return;dp.prompt();dp.userChoice.finally(function(){dp=null;ren();});};
  window.__instIOS=function(){var el=document.getElementById('installBar');if(!el)return;el.innerHTML='<div class="tip">📲 <b>加到 iPad / iPhone 桌面：</b><br>1. 用 <b>Safari</b> 開啟本頁<br>2. 點「分享 ⬆️」<br>3. 往下找「<b>加入主畫面 ➕</b>」<br>4. 右上按「新增」完成<br><span class="x" onclick="__instClose()">知道了 ✓</span></div>';};
  window.__instClose=function(){ren();};
  ren();
})();
</script>
